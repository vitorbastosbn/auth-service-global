spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:tc:postgresql:15:///auth_test_db}
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-for-testing-purposes-only-must-be-at-least-32-chars
  access-token-expiration: 900
  refresh-token-expiration: 604800

logging:
  level:
    com.auth.authservice: DEBUG
    org.springframework.security: DEBUG
